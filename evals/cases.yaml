- id: count_over_200_30d_para2
  intent: count_orders_over_200_30d
  # NOTE: "last month" is semantically ambiguous — GPT-5 sometimes emits
  # INTERVAL 30 DAY (→ 65 rows) and sometimes INTERVAL 1 MONTH (→ 67 rows,
  # because calendar months are ~30.4 days, not exactly 30). The pattern
  # check accepts both. The value check widens tolerance to cover both
  # outcomes and documents the drift rather than hiding it behind a
  # loose regex. This is what the rigor axis is meant to surface: pure
  # pattern matching would treat these as identical, but exact values do not.
  nl: "how many high-value orders (over $200) were placed in the last month"
  expected_scalar: 66
  expected_scalar_tolerance: 2
  expected_patterns:
    select_count: "(?i)select\\s+count\\s*\\("
    from_orders: "(?i)from\\s+orders"
    numeric_predicate: "(?i)price\\s*>\\s*200"
    time_predicate: "(?i)order_purchase_timestamp\\s*>=\\s*now\\s*\\(\\s*\\)\\s*-\\s*interval\\s+(30\\s+day|1\\s+month)"

