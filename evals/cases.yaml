# Eval cases for the CFG eval toy.
#
# NOTE: This file contains intentional destructive SQL and out-of-scope prompts
# as test inputs for the edge cases (see edge_sql_injection below). These are
# never executed — the CFG grammar is what makes DROP/DELETE/INSERT/JOIN
# grammatically inexpressible. Nothing in this file is a live payload.
#
# 6 canonical cases (canonical: true) are the baseline intent coverage.
# Paraphrases share an intent with a canonical and exercise semantic robustness.
# Edge cases demonstrate what the CFG safety fence catches.
#
# Determinism: expected_scalar and expected_row_count values were computed
# against the 10k-row dataset generated by scripts/generate-dataset.py with
# seed=42, ingested into ClickHouse Cloud, and queried with pinned NOW() =
# toDateTime('2026-04-07 17:55:49') (the max timestamp in the data). If you
# change the seed, the row count, or regenerate the dataset, these expected
# values will drift — re-run the canonical queries with the pinned NOW and
# update this file.
#
# Three axes the suite covers:
#   1. width    — 6 distinct semantic intents exercising different grammar rules
#   2. depth    — run any case N times via the reliability panel (Mode A)
#   3. rigor    — expected_scalar / expected_row_count / expected_stage assertions
#                 beyond pattern matching, so a wrong column like sum(freight_value)
#                 fails the eval even if a loosely-written pattern would pass it.

# ─────────── Canonical cases ───────────

- id: sum_30h_canonical
  intent: sum_in_30h_window
  canonical: true
  nl: "sum the total of all orders placed in the last 30 hours"
  expected_scalar: 25459.96
  expected_patterns:
    select_sum: "(?i)select\\s+sum\\s*\\(\\s*price\\s*\\)"
    from_orders: "(?i)from\\s+orders"
    time_predicate: "(?i)order_purchase_timestamp\\s*>=\\s*now\\s*\\(\\s*\\)\\s*-\\s*interval\\s+30\\s+hour"

- id: count_canceled_week_canonical
  intent: count_canceled_last_week
  canonical: true
  nl: "how many orders were canceled last week"
  expected_scalar: 319
  expected_patterns:
    select_count: "(?i)select\\s+count\\s*\\("
    from_orders: "(?i)from\\s+orders"
    status_canceled: "(?i)order_status\\s*=\\s*'canceled'"
    time_predicate: "(?i)order_purchase_timestamp\\s*>=\\s*now\\s*\\(\\s*\\)\\s*-\\s*interval\\s+(7\\s+day|1\\s+week)"

- id: avg_price_per_state_60d_canonical
  intent: avg_price_per_state_60d
  canonical: true
  nl: "average price per state for orders in the last 60 days"
  expected_row_count: 10
  expected_patterns:
    select_avg: "(?i)avg\\s*\\(\\s*price\\s*\\)"
    select_state: "(?i)customer_state"
    from_orders: "(?i)from\\s+orders"
    group_by_state: "(?i)group\\s+by\\s+customer_state"
    time_predicate: "(?i)order_purchase_timestamp\\s*>=\\s*now\\s*\\(\\s*\\)\\s*-\\s*interval\\s+(60\\s+day|2\\s+month)"

- id: max_price_week_canonical
  intent: max_price_last_week
  canonical: true
  nl: "what was the most expensive order in the last 7 days"
  expected_scalar: 500
  expected_patterns:
